<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Babcock CBT — Admin Panel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f1f5f9;min-height:100vh}
:root{--primary:#1a1a2e;--accent:#0f3460;--green:#15803d;--red:#dc2626;--amber:#d97706}
input,select,textarea,button{font-family:inherit}
.layout{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:220px;min-width:200px;background:var(--primary);display:flex;flex-direction:column;min-height:100vh}
.sb-logo{padding:18px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo h1{color:#fff;font-size:16px;font-weight:700}
.sb-logo p{color:rgba(255,255,255,.4);font-size:12px;margin-top:2px}
.sb-section{padding:10px 18px 4px;font-size:11px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.5px}
.nav-item{padding:10px 18px;font-size:14px;font-weight:500;color:rgba(255,255,255,.65);cursor:pointer;display:flex;align-items:center;gap:10px;transition:.15s;border-right:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:rgba(255,255,255,.1);color:#fff;border-right-color:#60a5fa}
.sb-spacer{flex:1}
.sb-user{padding:10px 18px;font-size:12px;color:rgba(255,255,255,.4)}
.sb-logout{padding:10px 18px;font-size:14px;color:rgba(255,80,80,.7);cursor:pointer;display:flex;align-items:center;gap:8px}
.sb-logout:hover{color:#f87171;background:rgba(255,80,80,.08)}

/* Main */
.main-area{flex:1;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.topbar h2{font-size:18px;font-weight:700;color:#1a1a2e}
.topbar-sub{font-size:13px;color:#64748b}
.page{padding:24px;flex:1}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:.15s;text-decoration:none}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover:not(:disabled){background:#16213e}
.btn-success{background:var(--green);color:#fff}.btn-success:hover:not(:disabled){background:#166534}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover:not(:disabled){background:#b91c1c}
.btn-ghost{background:#f1f5f9;color:#374151;border:1.5px solid #e2e8f0}.btn-ghost:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.btn-amber{background:#fef9c3;color:#854d0e;border:1.5px solid #fde047}.btn-amber:hover:not(:disabled){background:#fde047}
.btn-sm{padding:5px 12px;font-size:13px}
.btn-xs{padding:3px 9px;font-size:12px}

/* Forms */
.form-group{margin-bottom:14px}
label.fl{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:5px}
.fi{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:14px;outline:none;color:#1a1a2e;background:#fff;transition:.15s}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(15,52,96,.1)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.check-row{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;color:#374151}
.check-row input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}

/* Cards */
.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid #e2e8f0;margin-bottom:16px}
.stat-card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:4px solid var(--accent)}
.stat-val{font-size:32px;font-weight:800;color:#1a1a2e;line-height:1}
.stat-lbl{font-size:13px;color:#64748b;margin-top:6px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}

/* Tables */
.table-wrap{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid #e2e8f0;overflow:hidden;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:14px}
th{background:#f8fafc;padding:10px 14px;text-align:left;font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid #e2e8f0;white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid #f1f5f9;color:#374151;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
.td-actions{display:flex;gap:6px;flex-wrap:wrap}
.empty-row{text-align:center;padding:36px;color:#94a3b8;font-size:14px}

/* Badges */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;line-height:1.4}
.b-blue{background:#dbeafe;color:#1d4ed8}
.b-green{background:#dcfce7;color:#15803d}
.b-amber{background:#fef9c3;color:#854d0e}
.b-red{background:#fee2e2;color:#b91c1c}
.b-gray{background:#f1f5f9;color:#475569}
.b-purple{background:#f3e8ff;color:#7e22ce}

/* Q-type chips */
.q-chip{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.qc-mcq{background:#dbeafe;color:#1d4ed8}
.qc-tf{background:#dcfce7;color:#15803d}
.qc-multi{background:#fef9c3;color:#854d0e}
.qc-essay{background:#f3e8ff;color:#7e22ce}

/* Toolbar */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.toolbar-right{margin-left:auto;display:flex;gap:8px}
.search-box{padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;width:220px;transition:.15s}
.search-box:focus{border-color:var(--accent)}
.count-label{font-size:13px;color:#64748b;margin-bottom:10px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:640px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 25px 60px rgba(0,0,0,.3)}
.modal-sm{max-width:420px}
.modal-lg{max-width:900px}
.modal-hd{padding:18px 24px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-hd h2{font-size:17px;font-weight:700;color:#1a1a2e}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#94a3b8;line-height:1;padding:0}
.modal-body{padding:24px;overflow-y:auto;flex:1}
.modal-ft{padding:14px 24px;border-top:1px solid #e2e8f0;display:flex;justify-content:flex-end;gap:10px;flex-shrink:0}

/* Option rows in Q editor */
.opt-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.opt-row .fi{flex:1}
.opt-radio{width:18px;height:18px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}

/* Alert */
.alert{border-radius:8px;padding:12px 14px;font-size:13px;margin-bottom:14px}
.alert-info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.alert-warn{background:#fef9c3;color:#854d0e;border:1px solid #fde047}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:#1a1a2e;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.3);display:none;animation:slideUp .25s ease}
.toast.err{background:var(--red)}
.toast.warn{background:var(--amber)}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Spinner */
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite}
.spin-dark{border-color:rgba(15,52,96,.15);border-top-color:var(--accent)}
@keyframes sp{to{transform:rotate(360deg)}}

/* Result answer cards */
.ans-card{background:#fff;border-radius:10px;padding:18px;margin-bottom:12px;border:1px solid #e2e8f0;border-left:4px solid #e2e8f0}
.ans-card.correct{border-left-color:var(--green)}
.ans-card.wrong{border-left-color:var(--red)}
.ans-card.essay{border-left-color:#7e22ce}
.ans-card.unanswered{border-left-color:#94a3b8}
.opt-choice{padding:6px 10px;border-radius:6px;font-size:14px;color:#374151;margin-bottom:4px}
.opt-choice.student-pick{background:#fee2e2;color:var(--red)}
.opt-choice.correct-ans{background:#dcfce7;color:var(--green);font-weight:600}
.opt-choice.both{background:#dcfce7;color:var(--green);font-weight:600}
.exam-q-manager{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.q-list-panel{background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden;display:flex;flex-direction:column;max-height:620px}
.q-list-hd{padding:12px 16px;background:#f8fafc;border-bottom:1px solid #e2e8f0;font-size:13px;font-weight:700;color:#374151}
.q-list-body{overflow-y:auto;flex:1}
.q-row{padding:10px 14px;border-bottom:1px solid #f1f5f9;display:flex;align-items:flex-start;gap:8px}
.q-row:last-child{border-bottom:none}
.q-row:hover{background:#f8fafc}
.q-row-text{flex:1;min-width:0;font-size:13px;color:#1a1a2e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.q-row-meta{display:flex;gap:6px;margin-top:4px;align-items:center}
</style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sb-logo">
      <h1>Babcock CBT</h1>
      <p>Admin Panel</p>
    </div>
    <div class="sb-section">Navigation</div>
    <div class="nav-item active" data-page="dashboard" onclick="nav('dashboard')">📊 Dashboard</div>
    <div class="nav-item" data-page="students" onclick="nav('students')">👥 Students</div>
    <div class="nav-item" data-page="subjects" onclick="nav('subjects')">📚 Subjects</div>
    <div class="nav-item" data-page="questions" onclick="nav('questions')">❓ Question Bank</div>
    <div class="nav-item" data-page="exams" onclick="nav('exams')">📝 Exams</div>
    <div class="sb-spacer"></div>
    <div class="sb-section">Account</div>
    <div class="sb-user" id="sb-user-name"></div>
    <div class="sb-logout" onclick="logout()">🚪 Log out</div>
  </nav>

  <!-- Main -->
  <div class="main-area">
    <div class="topbar">
      <h2 id="page-title">Dashboard</h2>
      <span class="topbar-sub" id="topbar-sub"></span>
    </div>
    <div class="page" id="page-content">
      <div style="text-align:center;padding:60px"><span class="spin spin-dark"></span></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-box"></div>
</div>

<!-- Confirm modal -->
<div class="modal-overlay modal-sm" id="confirm-overlay">
  <div class="modal modal-sm">
    <div class="modal-hd"><h2>Confirm</h2><button class="modal-close" onclick="closeConfirm()">×</button></div>
    <div class="modal-body"><p id="confirm-msg" style="color:#374151;font-size:15px"></p></div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok-btn">Delete</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Auth check ────────────────────────────────────────────────────────────────
const _token = localStorage.getItem('cbt_token');
const _role  = localStorage.getItem('cbt_role');
const _name  = localStorage.getItem('cbt_name');
if (!_token || (_role !== 'admin' && _role !== 'teacher')) location.href = 'login.html';

const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? 'http://localhost:8000' : location.origin;

document.getElementById('sb-user-name').textContent = _name || 'Admin';
document.getElementById('topbar-sub').textContent = 'Logged in as ' + (_name || '');

// ── API helpers ───────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const r = await fetch(API + path, {
    ...opts,
    headers: { Authorization: `Bearer ${_token}`, ...(opts.headers || {}) },
  });
  if (r.status === 401) { localStorage.clear(); location.href = 'login.html'; }
  return r;
}
async function apiJSON(path, opts = {}) {
  const r = await api(path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}), ...(opts.headers || {}) },
  });
  const d = await r.json();
  if (!r.ok) throw new Error(d.detail || 'Request failed');
  return d;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let _toastTimer;
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (type === 'error' ? ' err' : type === 'warn' ? ' warn' : '');
  el.style.display = 'block';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.style.display = 'none', 3200);
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(html, large = false) {
  const box = document.getElementById('modal-box');
  box.className = 'modal' + (large ? ' modal-lg' : '');
  box.innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('modal-box').innerHTML = '';
}

let _confirmCb;
function confirm(msg, cb, btnLabel = 'Delete') {
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-ok-btn').textContent = btnLabel;
  document.getElementById('confirm-overlay').classList.add('open');
  _confirmCb = cb;
  document.getElementById('confirm-ok-btn').onclick = () => { closeConfirm(); cb(); };
}
function closeConfirm() { document.getElementById('confirm-overlay').classList.remove('open'); }

// ── Utilities ─────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function badge(status) {
  const M = {
    draft:['b-gray','Draft'], scheduled:['b-blue','Scheduled'],
    active:['b-green','Active'], ended:['b-gray','Ended'],
    submitted:['b-green','Submitted'], auto_submitted:['b-amber','Auto-submitted'],
    timed_out:['b-red','Timed out'], in_progress:['b-amber','In Progress'],
    not_started:['b-gray','Not Started'],
    admin:['b-blue','Admin'], teacher:['b-amber','Teacher'], student:['b-gray','Student'],
  };
  const [cls, label] = M[status] || ['b-gray', status];
  return `<span class="badge ${cls}">${label}</span>`;
}
function qChip(type) {
  const M = {mcq:'qc-mcq',true_false:'qc-tf',multi_select:'qc-multi',essay:'qc-essay'};
  const L = {mcq:'MCQ',true_false:'T/F',multi_select:'Multi',essay:'Essay'};
  return `<span class="q-chip ${M[type]||''}">${L[type]||type}</span>`;
}
function spinner() { return '<span class="spin spin-dark"></span>'; }
function pct(score, total) { return total ? Math.round(score/total*100) : 0; }

// ── Navigation ────────────────────────────────────────────────────────────────
const PAGE_TITLES = {
  dashboard:'Dashboard', students:'Students', subjects:'Subjects',
  questions:'Question Bank', exams:'Exams',
};
let _currentPage = '';

function nav(page) {
  _currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  document.getElementById('page-title').textContent = PAGE_TITLES[page] || page;
  document.getElementById('page-content').innerHTML =
    `<div style="text-align:center;padding:60px">${spinner()}</div>`;
  window._subPage = null;
  switch (page) {
    case 'dashboard': loadDashboard(); break;
    case 'students':  loadStudents(); break;
    case 'subjects':  loadSubjects(); break;
    case 'questions': loadQuestions(); break;
    case 'exams':     loadExams(); break;
  }
}

function logout() { localStorage.clear(); location.href = 'login.html'; }

// ════════════════════════════════════════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════════════════════════════════════════
async function loadDashboard() {
  try {
    const [students, exams, questions] = await Promise.all([
      apiJSON('/api/admin/users?role=student'),
      apiJSON('/api/admin/exams'),
      apiJSON('/api/admin/questions'),
    ]);
    const active = exams.filter(e => e.status === 'active').length;
    document.getElementById('page-content').innerHTML = `
      <div class="stats-grid">
        <div class="stat-card" style="border-left-color:var(--accent)">
          <div class="stat-val">${students.length}</div>
          <div class="stat-lbl">Total Students</div>
        </div>
        <div class="stat-card" style="border-left-color:#7e22ce">
          <div class="stat-val">${exams.length}</div>
          <div class="stat-lbl">Total Exams</div>
        </div>
        <div class="stat-card" style="border-left-color:var(--green)">
          <div class="stat-val">${active}</div>
          <div class="stat-lbl">Active Exams</div>
        </div>
        <div class="stat-card" style="border-left-color:var(--amber)">
          <div class="stat-val">${questions.length}</div>
          <div class="stat-lbl">Questions in Bank</div>
        </div>
      </div>
      <div class="card">
        <h3 style="margin-bottom:10px;color:#1a1a2e">Quick Start Guide</h3>
        <p style="color:#64748b;font-size:14px;line-height:1.8">
          <strong>1.</strong> Add <strong>Subjects</strong> (e.g. Mathematics, English).<br>
          <strong>2.</strong> Add <strong>Students</strong> individually or bulk-import from CSV.<br>
          <strong>3.</strong> Build the <strong>Question Bank</strong> — MCQ, True/False, Multi-select, or Essay.<br>
          <strong>4.</strong> Create an <strong>Exam</strong>, add questions from the bank, then set status to <em>Active</em>.<br>
          <strong>5.</strong> Students open <code>student.html</code> (or your server URL), log in, and take the exam.<br>
          <strong>6.</strong> View <strong>Results</strong> per exam; grade essay answers manually.
        </p>
      </div>`;
  } catch(e) { document.getElementById('page-content').innerHTML = `<div class="card">Error: ${esc(e.message)}</div>`; }
}

// ════════════════════════════════════════════════════════════════════════════
// STUDENTS
// ════════════════════════════════════════════════════════════════════════════
let _students = [];

async function loadStudents() {
  try {
    _students = await apiJSON('/api/admin/users');
    renderStudents();
  } catch(e) { document.getElementById('page-content').innerHTML = `<div class="card">Error: ${esc(e.message)}</div>`; }
}

function renderStudents(search = '') {
  const filtered = _students.filter(u =>
    !search ||
    u.full_name.toLowerCase().includes(search) ||
    (u.username||'').toLowerCase().includes(search) ||
    (u.reg_number||'').toLowerCase().includes(search) ||
    (u.class_name||'').toLowerCase().includes(search)
  );

  const rows = filtered.length ? filtered.map(u => `
    <tr>
      <td style="font-weight:600">${esc(u.full_name)}</td>
      <td style="color:#64748b">${esc(u.username)}</td>
      <td>${esc(u.reg_number||'—')}</td>
      <td>${esc(u.class_name||'—')}</td>
      <td>${badge(u.role)}</td>
      <td><span class="badge ${u.is_active?'b-green':'b-red'}">${u.is_active?'Active':'Disabled'}</span></td>
      <td class="td-actions">
        <button class="btn btn-ghost btn-sm" onclick="openUserModal(${u.id})">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id},'${esc(u.full_name)}')">Delete</button>
      </td>
    </tr>`).join('') : `<tr><td colspan="7" class="empty-row">No users found.</td></tr>`;

  document.getElementById('page-content').innerHTML = `
    <div class="toolbar">
      <input class="search-box" type="text" placeholder="Search name, username, reg no…"
        oninput="renderStudents(this.value.toLowerCase())" id="std-search">
      <button class="btn btn-ghost" onclick="openImportModal()">⬆ Bulk Import CSV</button>
      <div class="toolbar-right">
        <button class="btn btn-primary" onclick="openUserModal(null)">+ Add Student</button>
      </div>
    </div>
    <div class="count-label">${filtered.length} user${filtered.length!==1?'s':''}</div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Full Name</th><th>Username</th><th>Reg No.</th>
          <th>Class</th><th>Role</th><th>Status</th><th>Actions</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  // restore search
  const s = document.getElementById('std-search');
  if (s && search) s.value = search;
}

function openUserModal(userId) {
  const u = userId ? _students.find(x => x.id === userId) : null;
  openModal(`
    <div class="modal-hd">
      <h2>${u ? 'Edit User' : 'Add User'}</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="grid-2">
        <div class="form-group"><label class="fl">Full Name *</label>
          <input class="fi" id="u-name" value="${esc(u?.full_name||'')}"></div>
        <div class="form-group"><label class="fl">Username *</label>
          <input class="fi" id="u-username" value="${esc(u?.username||'')}"></div>
        <div class="form-group"><label class="fl">Password ${u?'(blank = no change)':'*'}</label>

async function saveUser(userId) {
  const btn = document.getElementById('u-save-btn');
  btn.disabled = true; btn.innerHTML = spinner() + ' Saving…';
  const body = {
    full_name:  document.getElementById('u-name').value.trim(),
    username:   document.getElementById('u-username').value.trim(),
    email:      document.getElementById('u-email').value.trim() || null,
    reg_number: document.getElementById('u-reg').value.trim() || null,
    class_name: document.getElementById('u-class').value.trim() || null,
    role:       document.getElementById('u-role').value,
    is_active:  document.getElementById('u-active').value === 'true',
  };
  const pw = document.getElementById('u-password').value;
  if (pw) body.password = pw;
  if (!body.full_name || !body.username) { toast('Name and username are required','error'); btn.disabled=false; btn.textContent='Save'; return; }
  try {
    if (userId) await apiJSON(`/api/admin/users/${userId}`, {method:'PUT', body:JSON.stringify(body)});
    else {
      if (!pw) { toast('Password required for new user','error'); btn.disabled=false; btn.textContent='Save'; return; }
      await apiJSON('/api/admin/users', {method:'POST', body:JSON.stringify(body)});
    }
    closeModal();
    toast(userId ? 'User updated' : 'User created');
    _students = await apiJSON('/api/admin/users');
    renderStudents();
  } catch(e) { toast(e.message,'error'); btn.disabled=false; btn.textContent='Save'; }
}

async function deleteUser(id, name) {
  confirm(`Delete "${name}"? This cannot be undone.`, async () => {
    try {
      await apiJSON(`/api/admin/users/${id}`, {method:'DELETE'});
      toast('User deleted');
      _students = await apiJSON('/api/admin/users');
      renderStudents();
    } catch(e) { toast(e.message,'error'); }
  });
}

function openImportModal() {
  openModal(`
    <div class="modal-hd"><h2>Bulk Import Students</h2><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="alert alert-info">
        CSV required columns: <code>username</code>, <code>full_name</code>, <code>password</code><br>
        Optional columns: <code>email</code>, <code>reg_number</code>, <code>class_name</code>, <code>role</code>
      </div>
      <div class="form-group"><label class="fl">Select CSV file</label>
        <input type="file" accept=".csv" id="csv-file" class="fi"></div>
      <div id="import-result"></div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="import-btn" onclick="doImport()">Import</button>
    </div>`);
}

async function doImport() {
  const file = document.getElementById('csv-file')?.files?.[0];
  if (!file) { toast('Select a CSV file first','warn'); return; }
  const btn = document.getElementById('import-btn');
  btn.disabled = true; btn.innerHTML = spinner() + ' Importing…';
  const fd = new FormData(); fd.append('file', file);
  try {
    const r = await api('/api/admin/users/bulk-import', {method:'POST', body:fd});
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail);
    document.getElementById('import-result').innerHTML =
      `<div class="alert alert-info">✓ Imported <strong>${d.created}</strong> users, skipped <strong>${d.skipped}</strong> duplicates.${
        d.errors.length ? '<br>Errors: ' + d.errors.slice(0,5).map(esc).join('; ') : ''}</div>`;
    toast(`Imported ${d.created} users`);
    _students = await apiJSON('/api/admin/users');
    renderStudents();
  } catch(e) { toast(e.message,'error'); }
  finally { btn.disabled=false; btn.textContent='Import'; }
}

function renderQuestions() {

// Question modal state
window._qOpts = [];
window._qEditId = null;

function openQModal(qId) {
  const q = qId ? _questions.find(x => x.id === qId) : null;
  window._qEditId = qId;
  window._qOpts = q?.options?.map(o=>({text:o.text,is_correct:o.is_correct})) ||
    [{text:'',is_correct:true},{text:'',is_correct:false},{text:'',is_correct:false},{text:'',is_correct:false}];

  const subjOpts = _subjects.map(s => `<option value="${s.id}" ${q?.subject_id===s.id?'selected':''}>${esc(s.name)}</option>`).join('');

  openModal(`
    <div class="modal-hd"><h2>${q?'Edit':'Add'} Question</h2><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="fl">Question Text *</label>
        <textarea class="fi" id="q-text" rows="3" placeholder="Enter question…">${esc(q?.text||'')}</textarea></div>
      <div class="grid-3">
        <div class="form-group"><label class="fl">Type</label>
          <select class="fi" id="q-type" onchange="onQTypeChange(this.value)">
            <option value="mcq" ${q?.type==='mcq'?'selected':''}>Multiple Choice</option>
            <option value="true_false" ${q?.type==='true_false'?'selected':''}>True / False</option>
            <option value="multi_select" ${q?.type==='multi_select'?'selected':''}>Multi-select</option>
            <option value="essay" ${q?.type==='essay'?'selected':''}>Essay / Short Answer</option>
          </select></div>
        <div class="form-group"><label class="fl">Points</label>
          <input class="fi" type="number" id="q-pts" min="0.5" step="0.5" value="${q?.points||1}"></div>
        <div class="form-group"><label class="fl">Subject</label>
          <select class="fi" id="q-subj"><option value="">None</option>${subjOpts}</select></div>
      </div>
      <div id="q-opts-section"></div>
      <div class="form-group"><label class="fl">Explanation (optional, shown after grading)</label>
        <textarea class="fi" id="q-expl" rows="2" placeholder="Why is this the correct answer?">${esc(q?.explanation||'')}</textarea></div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="q-save-btn" onclick="saveQuestion()">Save</button>
    </div>`);

  renderQOptions(q?.type || 'mcq');
}

function onQTypeChange(type) {
  if (type === 'true_false') {
    window._qOpts = [{text:'True',is_correct:true},{text:'False',is_correct:false}];
  } else if (type === 'essay') {
    window._qOpts = [];
  } else if (window._qOpts.length < 2) {
    window._qOpts = [{text:'',is_correct:true},{text:'',is_correct:false},{text:'',is_correct:false},{text:'',is_correct:false}];
  }
  renderQOptions(type);
}

function renderQOptions(type) {
  const sec = document.getElementById('q-opts-section');
  if (!sec) return;
  const needsOpts = ['mcq','true_false','multi_select'].includes(type);
  if (!needsOpts) { sec.innerHTML = ''; return; }

  const inputType = type === 'multi_select' ? 'checkbox' : 'radio';
  const hint = type === 'mcq' ? 'Select the correct answer (radio)' :
               type === 'multi_select' ? 'Check all correct answers' : '';

  sec.innerHTML = `
    <label class="fl" style="margin-bottom:8px">
      Answer Options ${hint ? `<span style="font-weight:400;color:#64748b">— ${hint}</span>` : ''}
    </label>
    <div id="opts-list">
      ${window._qOpts.map((o, i) => `
        <div class="opt-row" id="orow-${i}">
          <input class="opt-radio" type="${inputType}" name="qcorrect"
            ${o.is_correct?'checked':''} ${type==='true_false'?'disabled':''}
            onchange="setCorrect(${i},this.checked,'${type}')">
          <input class="fi" value="${esc(o.text)}" placeholder="Option ${i+1}"
            ${type==='true_false'?'disabled':''}
            oninput="window._qOpts[${i}].text=this.value">
          ${type!=='true_false' ? `<button class="btn btn-danger btn-xs" onclick="removeOpt(${i},'${type}')">×</button>` : ''}
        </div>`).join('')}
    </div>
    ${type!=='true_false' ? `<button class="btn btn-ghost btn-sm" style="margin-top:4px" onclick="addOpt('${type}')">+ Add Option</button>` : ''}`;
}

function setCorrect(i, val, type) {
  if (type === 'mcq' || type === 'true_false') {
    window._qOpts.forEach((o, j) => o.is_correct = j === i);
  } else {
    window._qOpts[i].is_correct = val;
  }
  renderQOptions(type);
}
function addOpt(type) {
  window._qOpts.push({text:'',is_correct:false});
  renderQOptions(type);
}
function removeOpt(i, type) {
  window._qOpts.splice(i, 1);
  renderQOptions(type);
}

async function saveQuestion() {
  const btn = document.getElementById('q-save-btn');
  btn.disabled = true; btn.innerHTML = spinner() + ' Saving…';
  const type = document.getElementById('q-type').value;
  const body = {
    text:       document.getElementById('q-text').value.trim(),
    type,
    points:     parseFloat(document.getElementById('q-pts').value) || 1,
    subject_id: document.getElementById('q-subj').value ? parseInt(document.getElementById('q-subj').value) : null,
    explanation:document.getElementById('q-expl').value.trim() || null,
    options:    ['mcq','true_false','multi_select'].includes(type)
                  ? window._qOpts.map((o,i) => ({text:o.text, is_correct:o.is_correct, order:i})) : [],
  };
  if (!body.text) { toast('Question text is required','error'); btn.disabled=false; btn.textContent='Save'; return; }
  try {
    if (window._qEditId) await apiJSON(`/api/admin/questions/${window._qEditId}`,{method:'PUT',body:JSON.stringify(body)});
    else await apiJSON('/api/admin/questions',{method:'POST',body:JSON.stringify(body)});
    closeModal(); toast(window._qEditId?'Question updated':'Question created');
    _questions = await apiJSON('/api/admin/questions'); renderQuestions();
  } catch(e) { toast(e.message,'error'); btn.disabled=false; btn.textContent='Save'; }
}

async function deleteQuestion(id) {
  confirm('Delete this question?', async () => {
    try { await apiJSON(`/api/admin/questions/${id}`,{method:'DELETE'}); toast('Deleted'); _questions=await apiJSON('/api/admin/questions'); renderQuestions(); }
    catch(e){ toast(e.message,'error'); }
  });
}

async function saveExam(id) {
  const btn = document.getElementById('ex-save-btn');
  btn.disabled=true; btn.innerHTML=spinner()+' Saving…';
  const cls = document.getElementById('ex-classes').value.trim();
  const body = {
    title:              document.getElementById('ex-title').value.trim(),
    subject_id:         document.getElementById('ex-subj').value ? parseInt(document.getElementById('ex-subj').value) : null,
    duration_minutes:   parseInt(document.getElementById('ex-dur').value)||60,
    pass_score:         parseFloat(document.getElementById('ex-pass').value)||50,
    max_violations:     parseInt(document.getElementById('ex-maxv').value)||3,
    allowed_classes:    cls ? cls.split(',').map(s=>s.trim()).filter(Boolean) : [],
    instructions:       document.getElementById('ex-instr').value.trim()||null,
    shuffle_questions:  document.getElementById('ex-shufq').checked,
    shuffle_options:    document.getElementById('ex-shufo').checked,
  };
  if (!body.title) { toast('Title required','error'); btn.disabled=false; btn.textContent='Save'; return; }
  try {
    if (id) await apiJSON(`/api/admin/exams/${id}`,{method:'PUT',body:JSON.stringify(body)});
    else await apiJSON('/api/admin/exams',{method:'POST',body:JSON.stringify(body)});
    closeModal(); toast(id?'Exam updated':'Exam created');
    _exams=await apiJSON('/api/admin/exams'); renderExams();
  } catch(e){ toast(e.message,'error'); btn.disabled=false; btn.textContent='Save'; }
}

async function setExamStatus(id, status) {
  try {
    await apiJSON(`/api/admin/exams/${id}`,{method:'PUT',body:JSON.stringify({status})});
    toast(`Exam ${status}`);
    _exams=await apiJSON('/api/admin/exams'); renderExams();
  } catch(e){ toast(e.message,'error'); }
}

async function deleteExam(id, title) {
  confirm(`Delete exam "${title}" and all its data?`, async () => {
    try{ await apiJSON(`/api/admin/exams/${id}`,{method:'DELETE'}); toast('Deleted'); _exams=await apiJSON('/api/admin/exams'); renderExams(); }
    catch(e){ toast(e.message,'error'); }
  });
}

// ── Exam Question Manager ─────────────────────────────────────────────────────
let _eqExam=null, _eqBankQ=[], _eqFilter={subject:'',type:'',search:''};

async function openExamQManager(examId) {
  document.getElementById('page-content').innerHTML=`<div style="text-align:center;padding:60px">${spinner()}</div>`;
  window._subPage='qmanager';
  document.getElementById('page-title').textContent='Manage Questions';
  try {
    [_eqExam, _eqBankQ, _subjects] = await Promise.all([
      apiJSON(`/api/admin/exams/${examId}`),
      apiJSON('/api/admin/questions'),
      apiJSON('/api/admin/subjects'),
    ]);
    renderQManager();
  } catch(e){ document.getElementById('page-content').innerHTML=`<div class="card">Error: ${esc(e.message)}</div>`; }
}

function renderQManager() {
  const examQIds = new Set(_eqExam.questions.map(eq=>eq.id));
  const f = _eqFilter;
  const available = _eqBankQ.filter(q=>
    !examQIds.has(q.id)&&
    (!f.subject||String(q.subject_id)===f.subject)&&
    (!f.type||q.type===f.type)&&
    (!f.search||q.text.toLowerCase().includes(f.search))
  );
  const totalPts = _eqExam.questions.reduce((s,q)=>s+(q.points||0),0);

  const subjOpts = _subjects.map(s=>`<option value="${s.id}" ${f.subject===String(s.id)?'selected':''}>${esc(s.name)}</option>`).join('');

  const inExam = _eqExam.questions.length
    ? _eqExam.questions.map((q,i)=>{
        const subj=_subjects.find(s=>s.id===q.subject_id);
        return `<div class="q-row">
          <span style="color:#94a3b8;font-size:12px;min-width:22px">${i+1}.</span>
          <div style="flex:1;min-width:0">
            <div class="q-row-text">${esc(q.text)}</div>
            <div class="q-row-meta">${qChip(q.type)}${subj?`<span style="font-size:11px;color:#94a3b8">${esc(subj.name)}</span>`:''}
              <span style="font-size:11px;color:#94a3b8">${q.points}pt</span></div>
          </div>
          <button class="btn btn-danger btn-xs" onclick="removeExamQ(${q.id})">×</button>
        </div>`;
      }).join('')
    : '<div style="padding:24px;text-align:center;color:#94a3b8;font-size:14px">No questions added yet.</div>';

  const inBank = available.length
    ? available.map(q=>{
        const subj=_subjects.find(s=>s.id===q.subject_id);
        return `<div class="q-row">
          <div style="flex:1;min-width:0">
            <div class="q-row-text">${esc(q.text)}</div>
            <div class="q-row-meta">${qChip(q.type)}${subj?`<span style="font-size:11px;color:#94a3b8">${esc(subj.name)}</span>`:''}
              <span style="font-size:11px;color:#94a3b8">${q.points}pt</span></div>
          </div>
          <button class="btn btn-success btn-xs" onclick="addExamQ(${q.id})">+</button>
        </div>`;
      }).join('')
    : '<div style="padding:24px;text-align:center;color:#94a3b8;font-size:14px">No questions available.</div>';

  document.getElementById('page-content').innerHTML = `
    <div style="margin-bottom:16px;display:flex;gap:10px;align-items:center">
      <button class="btn btn-ghost" onclick="loadExams();document.getElementById('page-title').textContent='Exams'">← Back to Exams</button>
      <span style="font-size:14px;color:#64748b">Exam: <strong>${esc(_eqExam.title)}</strong></span>
    </div>
    <div class="exam-q-manager">
      <div>
        <h3 style="margin-bottom:10px;font-size:15px;color:#1a1a2e">In Exam — ${_eqExam.questions.length} question${_eqExam.questions.length!==1?'s':''} (${totalPts} pts)</h3>
        <div class="q-list-panel">
          <div class="q-list-body">${inExam}</div>
        </div>
      </div>
      <div>
        <h3 style="margin-bottom:10px;font-size:15px;color:#1a1a2e">Question Bank</h3>
        <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
          <input class="search-box" style="width:150px" type="text" placeholder="Search…" value="${esc(f.search)}"
            oninput="_eqFilter.search=this.value.toLowerCase();renderQManager()">
          <select class="fi" style="width:auto;min-width:140px" onchange="_eqFilter.subject=this.value;renderQManager()">
            <option value="">All Subjects</option>${subjOpts}
          </select>
          <select class="fi" style="width:auto;min-width:120px" onchange="_eqFilter.type=this.value;renderQManager()">
            <option value="">All Types</option>
            <option value="mcq" ${f.type==='mcq'?'selected':''}>MCQ</option>
            <option value="true_false" ${f.type==='true_false'?'selected':''}>T/F</option>
            <option value="multi_select" ${f.type==='multi_select'?'selected':''}>Multi</option>
            <option value="essay" ${f.type==='essay'?'selected':''}>Essay</option>
          </select>
        </div>
        <div class="q-list-panel" style="max-height:540px">
          <div class="q-list-body">${inBank}</div>
        </div>
      </div>
    </div>`;
}

async function addExamQ(qid) {
  try {
    await apiJSON(`/api/admin/exams/${_eqExam.id}/questions`,{method:'POST',body:JSON.stringify({question_ids:[qid]})});
    _eqExam = await apiJSON(`/api/admin/exams/${_eqExam.id}`);
    renderQManager();
  } catch(e){ toast(e.message,'error'); }
}
async function removeExamQ(qid) {
  try {
    await apiJSON(`/api/admin/exams/${_eqExam.id}/questions/${qid}`,{method:'DELETE'});
    _eqExam = await apiJSON(`/api/admin/exams/${_eqExam.id}`);
    renderQManager();
  } catch(e){ toast(e.message,'error'); }
}

// ── Results ───────────────────────────────────────────────────────────────────
let _resultsExamId;

async function openResults(examId) {
  _resultsExamId = examId;
  document.getElementById('page-content').innerHTML=`<div style="text-align:center;padding:60px">${spinner()}</div>`;
  window._subPage='results';
  document.getElementById('page-title').textContent='Results';
  try {
    const results = await apiJSON(`/api/admin/exams/${examId}/results`);
    renderResults(results);
  } catch(e){ document.getElementById('page-content').innerHTML=`<div class="card">Error: ${esc(e.message)}</div>`; }
}

function renderResults(results) {
  const avg = results.length ? (results.reduce((s,r)=>s+(r.percentage||0),0)/results.length).toFixed(1)+'%' : '—';
  const passed = results.filter(r=>(r.percentage||0)>=50).length;
  const passRate = results.length ? Math.round(passed/results.length*100)+'%' : '—';

  const rows = results.length ? results.map(r=>`
    <tr>
      <td style="font-weight:600">${esc(r.student_name)}</td>
      <td>${esc(r.reg_number||'—')}</td>
      <td>${esc(r.class_name||'—')}</td>
      <td>${r.score!=null?`${r.score}/${r.total_points}`:'—'}</td>
      <td>${r.percentage!=null?`<span style="font-weight:700;color:${r.percentage>=50?'var(--green)':'var(--red)'}">${r.percentage}%</span>`:'—'}</td>
      <td>${badge(r.status)}</td>
      <td>${r.violation_count>0?`<span style="color:var(--red);font-weight:700">${r.violation_count}</span>`:'0'}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="openSessionDetail(${r.session_id})">View</button></td>
    </tr>`).join('') : `<tr><td colspan="8" class="empty-row">No submissions yet.</td></tr>`;

  document.getElementById('page-content').innerHTML = `
    <div style="margin-bottom:16px">
      <button class="btn btn-ghost" onclick="loadExams();document.getElementById('page-title').textContent='Exams'">← Back to Exams</button>
    </div>
    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px">
      <div class="stat-card"><div class="stat-val">${results.length}</div><div class="stat-lbl">Submissions</div></div>
      <div class="stat-card"><div class="stat-val">${avg}</div><div class="stat-lbl">Average Score</div></div>
      <div class="stat-card"><div class="stat-val">${passRate}</div><div class="stat-lbl">Pass Rate (≥50%)</div></div>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Student</th><th>Reg No.</th><th>Class</th><th>Score</th><th>%</th><th>Status</th><th>Violations</th><th>Detail</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

async function openSessionDetail(sessionId) {
  document.getElementById('page-content').innerHTML=`<div style="text-align:center;padding:60px">${spinner()}</div>`;
  try {
    const data = await apiJSON(`/api/admin/sessions/${sessionId}`);
    renderSessionDetail(data);
  } catch(e){ document.getElementById('page-content').innerHTML=`<div class="card">Error: ${esc(e.message)}</div>`; }
}

function renderSessionDetail(data) {
  const p = pct(data.score, data.total_points);
  const violStr = data.violations.length
    ? data.violations.map(v=>`<span class="badge b-red" style="margin-right:4px">${esc(v.type)}</span>`).join('')
    : '<span style="color:#64748b">None</span>';

  const answers = data.answers.map((a,i)=>{
    const isEssay = a.question_type === 'essay';
    const isCorrect = !isEssay && a.is_graded && (a.points_awarded||0) > 0;
    const isWrong   = !isEssay && a.is_graded && (a.points_awarded||0) === 0;
    const cls = isEssay ? 'essay' : isCorrect ? 'correct' : isWrong ? 'wrong' : 'unanswered';

    let body = '';
    if (isEssay) {
      body = `
        <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;font-size:14px;color:#374151;min-height:48px;margin-bottom:10px">
          ${a.text_answer ? esc(a.text_answer) : '<em style="color:#94a3b8">No answer provided</em>'}
        </div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <label class="fl" style="margin:0">Award points (max ${a.points}):</label>
          <input class="fi" type="number" min="0" max="${a.points}" step="0.5" id="grade-${a.question_id}"
            value="${a.points_awarded!=null?a.points_awarded:0}" style="width:80px">
          <button class="btn btn-primary btn-sm" onclick="gradeEssay(${data.session_id},${a.question_id},${a.points},'grade-${a.question_id}')">
            Save Grade
          </button>
        </div>`;
    } else {
      body = a.options.map(opt=>{
        const picked = (a.selected_option_ids||[]).includes(opt.id);
        const cls2 = opt.is_correct && picked ? 'both' : opt.is_correct ? 'correct-ans' : picked ? 'student-pick' : '';
        return `<div class="opt-choice ${cls2}">${picked?'► ':''} ${esc(opt.text)} ${opt.is_correct?'✓':''}</div>`;
      }).join('');
    }

    return `<div class="ans-card ${cls}">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:13px;font-weight:700;color:#64748b">Q${i+1} — ${qChip(a.question_type)}</span>
        <span style="font-size:13px;color:#64748b" id="pts-${a.question_id}">${a.points_awarded!=null?a.points_awarded:0} / ${a.points} pts</span>
      </div>
      <div style="font-size:15px;color:#1a1a2e;margin-bottom:10px">${esc(a.question_text)}</div>
      ${body}
      ${a.explanation?`<div style="margin-top:8px;padding:8px 12px;background:#eff6ff;border-radius:6px;font-size:13px;color:#1d4ed8">
        <strong>Explanation:</strong> ${esc(a.explanation)}</div>`:''}
    </div>`;
  }).join('');

  document.getElementById('page-content').innerHTML = `
    <div style="margin-bottom:16px">
      <button class="btn btn-ghost" onclick="openResults(${_resultsExamId})">← Back to Results</button>
    </div>
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;gap:24px;flex-wrap:wrap;align-items:center">
        <div><div style="font-size:12px;color:#64748b">Student</div><div style="font-weight:700;font-size:16px">${esc(data.student.full_name)}</div></div>
        <div><div style="font-size:12px;color:#64748b">Score</div><div style="font-weight:700;font-size:16px" id="total-score">${data.score} / ${data.total_points} (${p}%)</div></div>
        <div><div style="font-size:12px;color:#64748b">Status</div>${badge(data.status)}</div>
        <div><div style="font-size:12px;color:#64748b">Violations</div>${violStr}</div>
      </div>
    </div>
    <div>${answers}</div>`;
}

async function gradeEssay(sessionId, questionId, maxPts, inputId) {
  const pts = parseFloat(document.getElementById(inputId)?.value);
  if (isNaN(pts) || pts < 0 || pts > maxPts) { toast(`Points must be 0–${maxPts}`,'warn'); return; }
  try {
    const result = await apiJSON('/api/admin/sessions/grade-essay',{
      method:'POST',
      body:JSON.stringify({session_id:sessionId,question_id:questionId,points_awarded:pts}),
    });
    toast('Grade saved');
    const el = document.getElementById(`pts-${questionId}`);
    if (el) el.textContent = `${pts} / ${maxPts} pts`;
    const scoreEl = document.getElementById('total-score');
    if (scoreEl && result.new_score != null) {
      const data_total = parseFloat(scoreEl.textContent.split('/')[1]);
      scoreEl.textContent = `${result.new_score} / ${data_total!=null?data_total:'?'} (${pct(result.new_score,data_total)}%)`;
    }
  } catch(e){ toast(e.message,'error'); }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
nav('dashboard');
</script>
</body>
</html>
